name: Deploy Quartz Site
on:
  push:
    branches:
      - main  # main 브랜치에 푸시될 때마다 작동

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build Quartz
        run: |
          # 1. 내 저장소의 커스텀 파일들을 임시 폴더로 대피 (삭제 방지)
          mkdir -p my-configs
          cp -r quartz/styles/custom.scss my-configs/ || true
          cp quartz.config.ts my-configs/ || true

          # 2. Quartz 순정 소스 가져오기
          git clone https://github.com/jackyzha0/quartz.git tmp-quartz
          cp -r tmp-quartz/* .

          # 3. [핵심] 대피시켰던 내 설정 파일들을 다시 제자리로 덮어쓰기
          cp my-configs/custom.scss quartz/styles/custom.scss || true
          cp my-configs/quartz.config.ts . || true

          # 4. 의존성 설치 및 빌드
          npm install
          rm -rf content/*
          cp -r dist/* content/
          npx quartz build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
