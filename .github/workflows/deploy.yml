name: Deploy Quartz Site
on:
  push:
    branches:
      - main  # main 브랜치에 푸시될 때마다 작동

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build Quartz
        run: |
          # 1. Quartz 소스 코드를 가상 서버의 임시 폴더로 가져오기
          git clone https://github.com/jackyzha0/quartz.git tmp-quartz
          
          # 2. 필요한 파일들을 현재 루트로 이동 (force copy)
          cp -r tmp-quartz/* .
          
          # 3. 의존성 설치 (가장 확실한 방법)
          npm install
          
          # 4. 기존 샘플 삭제 및 우리가 보낸 dist 내용 주입
          rm -rf content/*
          cp -r dist/* content/
          
          # 5. 빌드 실행 (설치된 로컬 실행 파일 사용)
          npx quartz build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
