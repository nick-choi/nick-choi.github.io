name: Deploy Quartz Site
on:
  push:
    branches:
      - main  # main 브랜치에 푸시될 때마다 작동

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build Quartz
        run: |
          # 1. Quartz 소스 코드를 가상 서버의 임시 폴더로 가져오기
          git clone https://github.com/jackyzha0/quartz.git tmp-quartz
          
          # 2. 필요한 파일들을 현재 루트로 이동 (force copy)
          cp -r tmp-quartz/* .
          
          # 3. [핵심 추가] 내 저장소의 커스텀 파일(SCSS 등)을 다시 복구/적용
          # 이 단계가 있어야 사용자님의 디자인이 최종적으로 살아남습니다.
          git checkout HEAD -- quartz/styles/custom.scss 2>/dev/null || true
          # 만약 quartz.config.ts도 수정했다면 아래 줄도 추가
          git checkout HEAD -- quartz.config.ts 2>/dev/null || true

          # 4. 의존성 설치
          npm install
          
          # 5. 콘텐츠 주입
          rm -rf content/*
          cp -r dist/* content/
          
          # 6. 빌드 실행
          npx quartz build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
